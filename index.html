<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quran Tehfeez — Class Attendance</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  body { background: #f0f2f5; font-family: 'Inter', system-ui, sans-serif; }
  .font-display { font-family: 'Baloo 2', 'Inter', sans-serif; }

  /* Top navbar */
  .topbar { background: #2a313c; }
  .logo-mark {
    width: 40px; height: 40px; border-radius: 8px;
    background: #fff; color: #2a313c;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.25rem;
  }

  /* Stat tiles */
  .tile { border-radius: 14px; padding: 1.1rem 0.5rem; text-align: center; }
  .tile .num { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.7rem; line-height: 1.1; }
  .tile .lbl { font-weight: 600; font-size: 0.85rem; }
  .tile-green  { background: #aedcb6; } .tile-green  .num, .tile-green  .lbl { color: #1e6e34; }
  .tile-blue   { background: #99cdf5; } .tile-blue   .num, .tile-blue   .lbl { color: #1266ad; }
  .tile-orange { background: #f7a98c; } .tile-orange .num, .tile-orange .lbl { color: #c14515; }

  /* Purple totals card */
  .contribution {
    background: linear-gradient(135deg, #8636d8 0%, #5f27a8 100%);
    border-radius: 16px; color: #fff;
  }
  .contribution .inner {
    background: rgba(255,255,255,0.14);
    border-radius: 12px; text-align: center; padding: 0.9rem 0.25rem;
  }
  .contribution .inner .num { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.5rem; line-height: 1.1; }
  .contribution .inner .lbl { font-size: 0.8rem; opacity: 0.9; }

  /* Section headings like "Attendance" */
  .section-title {
    font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 1.35rem; color: #7a30c9;
  }

  /* Cards */
  .card { border: none; border-radius: 14px; box-shadow: 0 1px 4px rgba(20,30,50,0.08); }

  /* Student / location group cards */
  .group-header {
    background: linear-gradient(180deg, #8a929e 0%, #737c89 100%);
    color: #fff; border-radius: 14px 14px 0 0;
    padding: 0.65rem 1rem;
    display: flex; align-items: center; gap: 0.65rem;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.35); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
  }
  .group-header .gname { font-weight: 600; }
  .group-header .gsub { font-size: 0.78rem; opacity: 0.9; }
  .group-header:hover { filter: brightness(1.06); }
  .chevron {
    display: inline-block; transition: transform 0.18s ease;
    font-size: 1rem; opacity: 0.9; flex-shrink: 0;
  }
  .chevron.open { transform: rotate(180deg); }

  /* Student search suggestions */
  .suggestions {
    position: absolute; left: 0.75rem; right: 0.75rem; z-index: 1050;
    background: #fff; border: 1px solid #d5dbe3; border-radius: 10px;
    margin-top: 4px; max-height: 260px; overflow-y: auto;
  }
  .suggestion-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.55rem 0.75rem; cursor: pointer; font-size: 0.9rem;
  }
  .suggestion-item:hover, .suggestion-item.active { background: #f0f4fa; }
  .suggestion-item + .suggestion-item { border-top: 1px solid #f0f2f5; }
  .sug-avatar {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    background: #e4e9f0; color: #5a6472;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700;
  }

  /* Reports button (per group card) */
  .btn-report {
    background: #fff; color: #5b5bd6; border: 1px solid #cfd4f5;
    font-weight: 600; font-size: 0.78rem; border-radius: 8px;
    padding: 0.2rem 0.7rem; flex-shrink: 0;
  }
  .btn-report:hover { background: #f2f3fd; color: #4646c6; border-color: #5b5bd6; }

  /* Add-student panel */
  .add-student-panel {
    background: #f7f8fa; border: 1px solid #e3e7ec; border-radius: 12px;
    padding: 0.85rem;
  }
  .roster-scroll { max-height: 220px; overflow-y: auto; border: 1px solid #e3e7ec; border-radius: 10px; background: #fff; }
  .roster-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.6rem; font-size: 0.85rem;
  }
  .roster-row + .roster-row { border-top: 1px solid #f0f2f5; }

  /* Buttons */
  .btn-checkin {
    background: linear-gradient(90deg, #1f7ae0, #2196f3);
    color: #fff; font-weight: 700; border-radius: 10px;
  }
  .btn-checkin:hover, .btn-checkin:focus { color: #fff; filter: brightness(1.05); }
  .btn-ghost {
    border: 1px solid #d5dbe3; color: #1f7ae0; background: #fff; font-weight: 600; border-radius: 10px;
  }
  .btn-ghost:hover { border-color: #1f7ae0; color: #1f7ae0; }

  .nav-pills .nav-link { color: #3a4552; font-weight: 600; font-size: 0.875rem; border-radius: 10px; }
  .nav-pills .nav-link.active { background: #2a313c; }

  .table th {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: #5a6472; white-space: nowrap;
  }
  .table td { vertical-align: middle; }
  @media (max-width: 576px) {
    .table td, .table th { font-size: 0.85rem; padding: 0.5rem; }
    .tile .num { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ── PASTE YOUR APPS SCRIPT WEB APP URL HERE (ends in /exec) ──────────
const API_URL = "https://script.google.com/macros/s/AKfycby2WTjMlnHXWBHhs7cP6_HQnytGBGTgfFtZWFwBt7aFKZcpI2xvcmUR2x3bZZaZe3Iy/exec";
// ─────────────────────────────────────────────────────────────────────

// ── Default roster (from Quran_Tehfeez.xlsx → Idara sheet) ───────────
// Used as a fallback/seed only — the live roster is fetched from your
// Google Sheet's "Roster" tab, so students added via the dashboard
// persist there and sync across devices.
const DEFAULT_ROSTER = {
  "Jeddah Students": "Jeddah",
  "Ammar Husnain Bharmal": "Jeddah",
  "Zahra Abbas Lokhandwala": "Jeddah",
  "Jamila Tayyeb Saifee": "Jeddah",
  "Sakina Abbas Lokhandwala": "Jeddah",
  "Arefa Husnain Bharmal": "Jeddah",
  "Salman M Shabbir Mutawwif": "Jeddah",
  "Insiyah Shk Huzaifa Rangwala": "Jeddah",
  "Zoab Abdeali Bhagat": "Jeddah",
  "Nairobi Students": "Nairobi",
  "Batool Jamaly": "Nairobi",
  "M Burhanuddin Ahmedabadwala": "Nairobi",
  "Zahra Shk Huzaifa Ahmedabadwala": "Nairobi",
  "Farida Hatim Alyamani": "Nairobi",
  "Shk Juzer Morogo": "Nairobi",
  "MSB Students": "Daresalam",
  "Yusuf Moti": "Yaqut",
  "Zahra Qasim Multan": "Yaqut",
  "Yaqut Students": "Yaqut",
  "Dubai Students": "Dubai",
  "Sakina Khumusi": "Dubai",
  "Ruqaiyah Halai": "Dubai",
  "Adnan Halai": "Dubai",
  "Mariyam Bai": "Dubai",
  "Arwa Bai": "Dubai",
};

const STATUS_BADGE = {
  present: "text-bg-success",
  absent: "text-bg-danger",
  holiday: "text-bg-warning",
};
const STATUS_LABEL = { present: "Present", absent: "Absent", holiday: "Holiday" };

const today = () => new Date().toISOString().slice(0, 10);
const emptyForm = () => ({ name: "", status: "present", duration: "", date: today() });

// Normalize any date the API returns (plain yyyy-mm-dd, ISO timestamp,
// or locale string) to yyyy-mm-dd using the browser's local timezone.
// Internal dates are always yyyy-mm-dd so string comparison sorts/filters correctly.
const pad2 = (n) => String(n).padStart(2, "0");
function normalizeDate(v) {
  const s = String(v || "").trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s);
  if (!isNaN(d.getTime())) {
    return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
  }
  return s;
}

// Display format: DD/MM/YYYY
function displayDate(iso) {
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : iso;
}

const initials = (name) =>
  name.split(/\s+/).filter(Boolean).map((w) => w[0]).slice(0, 2).join("").toUpperCase();

// Generate a PDF report for one student or one location.
// kind: "student" | "location"; rows: that subject's (date-filtered) records
function generatePdf(kind, label, rows, range) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const pageW = doc.internal.pageSize.getWidth();

  // Header band
  doc.setFillColor(42, 49, 60); // #2a313c
  doc.rect(0, 0, pageW, 26, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(15);
  doc.setFont("helvetica", "bold");
  doc.text("Quran Tehfeez — Attendance Report", 14, 12);
  doc.setFontSize(10);
  doc.setFont("helvetica", "normal");
  doc.text(
    (kind === "student" ? "Student: " : "Location: ") + label,
    14, 20
  );

  // Meta lines
  doc.setTextColor(60, 68, 80);
  doc.setFontSize(9);
  let y = 34;
  const rangeText = range.from && range.to ? `${displayDate(range.from)} to ${displayDate(range.to)}`
    : range.from ? `from ${displayDate(range.from)}`
    : range.to ? `up to ${displayDate(range.to)}`
    : "All dates";
  doc.text(`Period: ${rangeText}`, 14, y);
  doc.text(`Generated: ${displayDate(new Date().toISOString().slice(0, 10))}`, pageW - 14, y, { align: "right" });

  // Summary
  const s = { present: 0, absent: 0, holiday: 0, minutes: 0 };
  rows.forEach((r) => {
    if (s[r.status] !== undefined) s[r.status]++;
    s.minutes += r.duration;
  });
  y += 8;
  doc.setFontSize(10);
  doc.setFont("helvetica", "bold");
  doc.setTextColor(42, 49, 60);
  doc.text("Summary", 14, y);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  y += 6;
  doc.text(
    `Present: ${s.present}    Absent: ${s.absent}    Holiday: ${s.holiday}    ` +
    `Total: ${s.minutes} min (${(s.minutes / 60).toFixed(1)} hrs)`,
    14, y
  );

  // For a location report, insert a per-student subtotal table (summed
  // duration per student) before the full record-level detail.
  if (kind === "location") {
    const byName = {};
    rows.forEach((r) => {
      if (!byName[r.name]) byName[r.name] = { name: r.name, present: 0, absent: 0, holiday: 0, minutes: 0 };
      const b = byName[r.name];
      if (b[r.status] !== undefined) b[r.status]++;
      b.minutes += r.duration;
    });
    const subRows = Object.values(byName).sort((a, b) => a.name.localeCompare(b.name));

    y += 10;
    doc.setFontSize(10);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(42, 49, 60);
    doc.text("By Student", 14, y);

    doc.autoTable({
      startY: y + 4,
      head: [["Student", "Present", "Absent", "Holiday", "Total Minutes"]],
      body: subRows.map((s) => [s.name, String(s.present), String(s.absent), String(s.holiday), String(s.minutes)]),
      styles: { fontSize: 9, cellPadding: 2.5 },
      headStyles: { fillColor: [91, 91, 214], textColor: 255, fontStyle: "bold" },
      alternateRowStyles: { fillColor: [244, 246, 249] },
      columnStyles: { 1: { halign: "right" }, 2: { halign: "right" }, 3: { halign: "right" }, 4: { halign: "right" } },
      margin: { left: 14, right: 14 },
    });
    y = doc.lastAutoTable.finalY + 8;

    doc.setFontSize(10);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(42, 49, 60);
    doc.text("Individual Records", 14, y);
    y += 2;
  }

  // Records table (oldest first reads naturally in a report)
  const sorted = [...rows].sort((a, b) => a.date.localeCompare(b.date));
  const head = kind === "student"
    ? [["Date", "Location", "Attendance", "Minutes"]]
    : [["Date", "Student", "Attendance", "Minutes"]];
  const body = sorted.map((r) => (
    kind === "student"
      ? [displayDate(r.date), r.location, (STATUS_LABEL[r.status] || r.status), r.status === "present" ? String(r.duration) : "-"]
      : [displayDate(r.date), r.name, (STATUS_LABEL[r.status] || r.status), r.status === "present" ? String(r.duration) : "-"]
  ));

  doc.autoTable({
    startY: y + 6,
    head, body,
    styles: { fontSize: 9, cellPadding: 2.5 },
    headStyles: { fillColor: [42, 49, 60], textColor: 255, fontStyle: "bold" },
    alternateRowStyles: { fillColor: [244, 246, 249] },
    columnStyles: { 3: { halign: "right" } },
    margin: { left: 14, right: 14 },
    didDrawPage: (data) => {
      // Footer with page number
      doc.setFontSize(8);
      doc.setTextColor(150);
      doc.text(
        `Page ${doc.internal.getNumberOfPages()}`,
        pageW - 14,
        doc.internal.pageSize.getHeight() - 8,
        { align: "right" }
      );
    },
  });

  const safe = label.replace(/[^a-z0-9]+/gi, "_");
  doc.save(`${safe}_attendance_report.pdf`);
}

// POST body sent without a JSON content-type on purpose — Apps Script
// web apps don't answer CORS preflight; a plain body avoids one.
async function api(method, body) {
  const opts = { method };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_URL, opts);
  return res.json();
}

function AttendanceDashboard() {
  const [records, setRecords] = useState([]);
  const [roster, setRoster] = useState(DEFAULT_ROSTER);
  const [form, setForm] = useState(emptyForm());
  const [view, setView] = useState("all"); // all | name | location
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [fromDate, setFromDate] = useState("");
  const [toDate, setToDate] = useState("");

  const studentNames = Object.keys(roster).sort((a, b) => a.localeCompare(b));
  const knownLocations = Array.from(new Set(Object.values(roster))).sort((a, b) => a.localeCompare(b));

  // Add-student panel
  const [showAddStudent, setShowAddStudent] = useState(false);
  const [newName, setNewName] = useState("");
  const [newLocation, setNewLocation] = useState("");
  const [addStudentError, setAddStudentError] = useState("");
  const [addingStudent, setAddingStudent] = useState(false);
  // Which group cards are expanded, keyed by "view:label". Collapsed by default.
  const [openGroups, setOpenGroups] = useState({});
  // Student search box
  const [studentQuery, setStudentQuery] = useState("");
  const [showSuggestions, setShowSuggestions] = useState(false);

  const suggestions = studentNames.filter((n) =>
    n.toLowerCase().includes(studentQuery.trim().toLowerCase())
  );

  const pickStudent = (name) => {
    setForm((f) => ({ ...f, name }));
    setStudentQuery(name);
    setShowSuggestions(false);
  };

  const onStudentInput = (val) => {
    setStudentQuery(val);
    setShowSuggestions(true);
    // Typing invalidates the previous selection unless it's an exact match
    const exact = studentNames.find((n) => n.toLowerCase() === val.trim().toLowerCase());
    setForm((f) => ({ ...f, name: exact || "" }));
  };

  const toggleGroup = (key) =>
    setOpenGroups((cur) => ({ ...cur, [key]: !cur[key] }));

  const setAllGroups = (groupKey, labels, open) => {
    setOpenGroups((cur) => {
      const next = { ...cur };
      labels.forEach((l) => { next[groupKey + ":" + l] = open; });
      return next;
    });
  };

  // Records shown everywhere below, restricted to the chosen date range.
  const filtered = records.filter((r) => {
    if (fromDate && r.date < fromDate) return false;
    if (toDate && r.date > toDate) return false;
    return true;
  });

  // Top-line stats, driven by the filtered range
  const stats = (() => {
    const s = { present: 0, absent: 0, holiday: 0, minutes: 0 };
    const students = new Set();
    filtered.forEach((r) => {
      if (s[r.status] !== undefined) s[r.status]++;
      s.minutes += r.duration;
      students.add(r.name);
    });
    s.students = students.size;
    return s;
  })();

  const loadRecords = async () => {
    setError("");
    setLoading(true);
    try {
      const data = await api("GET");
      if (data.ok) {
        const cleaned = data.records.map((r) => ({ ...r, date: normalizeDate(r.date) }));
        setRecords(cleaned.sort((a, b) => Number(b.id) - Number(a.id)));
        // Roster comes from the sheet's "Roster" tab. If the Apps Script
        // hasn't been updated to return one, keep the built-in default.
        if (data.roster && Object.keys(data.roster).length > 0) {
          setRoster(data.roster);
        }
      } else {
        setError("Could not load records: " + (data.error || "unknown error"));
      }
    } catch (e) {
      setError("Could not reach Google Sheets. Check your internet connection and the API_URL in this file.");
    }
    setLoading(false);
  };

  useEffect(() => {
    if (API_URL.startsWith("PASTE_")) {
      setError("Setup needed: paste your Apps Script URL into API_URL at the top of this file.");
      setLoading(false);
      return;
    }
    loadRecords();
  }, []);

  const addRecord = async () => {
    setError("");
    const name = form.name;
    const duration = form.status === "present" ? Number(form.duration) : 0;

    if (!name) return setError("Select a student.");
    if (!form.date) return setError("Select the class date.");
    if (form.status === "present" && (!form.duration || duration <= 0))
      return setError("Enter the class duration in minutes.");

    const rec = {
      id: String(Date.now()),
      name,
      location: roster[name],
      status: form.status,
      duration,
      date: form.date,
    };

    setSaving(true);
    setRecords([rec, ...records]);
    setForm(emptyForm());
    setStudentQuery("");
    try {
      const res = await api("POST", { action: "add", record: rec });
      if (!res.ok) {
        setError("Save failed: " + (res.error || "unknown error"));
        setRecords((cur) => cur.filter((r) => r.id !== rec.id));
      }
    } catch (e) {
      setError("Save failed — could not reach Google Sheets.");
      setRecords((cur) => cur.filter((r) => r.id !== rec.id));
    }
    setSaving(false);
  };

  const deleteRecord = async (id) => {
    setError("");
    const backup = records;
    setRecords(records.filter((r) => r.id !== id));
    try {
      const res = await api("POST", { action: "delete", id });
      if (!res.ok) {
        setError("Delete failed: " + (res.error || "unknown error"));
        setRecords(backup);
      }
    } catch (e) {
      setError("Delete failed — could not reach Google Sheets.");
      setRecords(backup);
    }
  };

  const addStudent = async () => {
    setAddStudentError("");
    const name = newName.trim();
    const location = newLocation.trim();

    if (!name) return setAddStudentError("Enter the student's name.");
    if (!location) return setAddStudentError("Enter the student's location.");
    const dupe = studentNames.find((n) => n.toLowerCase() === name.toLowerCase());
    if (dupe) return setAddStudentError(`"${dupe}" is already on the roster.`);

    setAddingStudent(true);
    const backup = roster;
    setRoster((cur) => ({ ...cur, [name]: location }));
    try {
      const res = await api("POST", { action: "addStudent", record: { name, location } });
      if (!res.ok) {
        setAddStudentError("Save failed: " + (res.error || "unknown error"));
        setRoster(backup);
      } else {
        setNewName("");
        setNewLocation("");
      }
    } catch (e) {
      setAddStudentError("Save failed — could not reach Google Sheets.");
      setRoster(backup);
    }
    setAddingStudent(false);
  };

  const removeStudent = async (name) => {
    setAddStudentError("");
    const backup = roster;
    const next = { ...roster };
    delete next[name];
    setRoster(next);
    try {
      const res = await api("POST", { action: "deleteStudent", name });
      if (!res.ok) {
        setAddStudentError("Remove failed: " + (res.error || "unknown error"));
        setRoster(backup);
      }
    } catch (e) {
      setAddStudentError("Remove failed — could not reach Google Sheets.");
      setRoster(backup);
    }
  };

  const groupBy = (key) => {
    const groups = {};
    for (const r of filtered) {
      const k = r[key];
      if (!groups[k]) groups[k] = [];
      groups[k].push(r);
    }
    return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
  };

  const summarize = (rows) => {
    const s = { present: 0, absent: 0, holiday: 0, minutes: 0 };
    rows.forEach((r) => {
      if (s[r.status] !== undefined) s[r.status]++;
      s.minutes += r.duration;
    });
    return s;
  };

  // Used for the "By location" view: within a location, subtotal each
  // student's records — counts by status and summed class duration.
  const summarizeByStudent = (rows) => {
    const byName = {};
    rows.forEach((r) => {
      if (!byName[r.name]) byName[r.name] = { name: r.name, present: 0, absent: 0, holiday: 0, minutes: 0, count: 0 };
      const b = byName[r.name];
      if (b[r.status] !== undefined) b[r.status]++;
      b.minutes += r.duration;
      b.count++;
    });
    return Object.values(byName).sort((a, b) => a.name.localeCompare(b.name));
  };

  const RecordTable = ({ rows }) => (
    <div className="table-responsive">
      <table className="table table-hover align-middle mb-0">
        <thead>
          <tr>
            {view !== "name" && <th>Student</th>}
            {view !== "location" && <th>Location</th>}
            <th>Date</th>
            <th>Attendance</th>
            <th className="text-end">Mins</th>
            <th style={{ width: 40 }}></th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r) => (
            <tr key={r.id}>
              {view !== "name" && <td className="fw-semibold">{r.name}</td>}
              {view !== "location" && <td>{r.location}</td>}
              <td className="text-secondary text-nowrap">{displayDate(r.date)}</td>
              <td>
                <span className={"badge rounded-pill " + (STATUS_BADGE[r.status] || "text-bg-secondary")}>
                  {STATUS_LABEL[r.status] || r.status}
                </span>
              </td>
              <td className="text-end">{r.status === "present" ? r.duration : "—"}</td>
              <td className="text-center">
                <button
                  className="btn btn-sm btn-link text-secondary p-0"
                  title="Delete record"
                  onClick={() => deleteRecord(r.id)}
                >✕</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  // Per-student subtotal table, used inside "By location" group cards —
  // one row per student with counts and summed class duration.
  const StudentSubtotalTable = ({ rows }) => {
    const subs = summarizeByStudent(rows);
    return (
      <div className="table-responsive">
        <table className="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Student</th>
              <th className="text-end">Present</th>
              <th className="text-end">Absent</th>
              <th className="text-end">Holiday</th>
              <th className="text-end">Total Mins</th>
            </tr>
          </thead>
          <tbody>
            {subs.map((s) => (
              <tr key={s.name}>
                <td className="fw-semibold">{s.name}</td>
                <td className="text-end">{s.present}</td>
                <td className="text-end">{s.absent}</td>
                <td className="text-end">{s.holiday}</td>
                <td className="text-end fw-semibold">{s.minutes}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  };

  const RangeEmpty = () => (
    <div className="card">
      <div className="card-body text-center text-secondary py-5">
        <div className="fw-semibold mb-1" style={{ color: "#2a313c" }}>
          {records.length > 0 ? "No records in this date range" : "No records yet"}
        </div>
        <div className="small">
          {records.length > 0
            ? "Adjust the From/To dates or clear the filter."
            : "Check in a student above to get started."}
        </div>
      </div>
    </div>
  );

  const GroupedView = ({ groupKey }) => {
    const groups = groupBy(groupKey);
    if (groups.length === 0) return <RangeEmpty />;
    const labels = groups.map(([label]) => label);
    const openCount = labels.filter((l) => openGroups[groupKey + ":" + l]).length;
    return (
      <div className="d-flex flex-column gap-3">
        <div className="d-flex justify-content-end gap-2">
          <button
            className="btn btn-sm btn-ghost"
            onClick={() => setAllGroups(groupKey, labels, true)}
            disabled={openCount === labels.length}
          >Expand all</button>
          <button
            className="btn btn-sm btn-ghost"
            onClick={() => setAllGroups(groupKey, labels, false)}
            disabled={openCount === 0}
          >Collapse all</button>
        </div>
        {groups.map(([label, rows]) => {
          const s = summarize(rows);
          const key = groupKey + ":" + label;
          const open = !!openGroups[key];
          return (
            <div className="card" key={label}>
              <div
                className={"group-header" + (open ? "" : " collapsed-header")}
                role="button"
                tabIndex={0}
                onClick={() => toggleGroup(key)}
                onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleGroup(key); } }}
                aria-expanded={open}
                style={{ cursor: "pointer", borderRadius: open ? "14px 14px 0 0" : "14px" }}
              >
                <div className="avatar">{initials(label)}</div>
                <div className="flex-grow-1 min-w-0">
                  <div className="gname text-truncate">{label}</div>
                  <div className="gsub">
                    {groupKey === "name" ? (roster[label] || rows[0].location) + " · " : ""}
                    {s.present} present · {s.absent} absent · {s.holiday} holiday · {s.minutes} min
                  </div>
                </div>
                <span className="badge rounded-pill text-bg-light me-1">
                  {rows.length} {rows.length === 1 ? "record" : "records"}
                </span>
                <button
                  className="btn btn-sm btn-report"
                  onClick={(e) => {
                    e.stopPropagation();
                    generatePdf(groupKey === "name" ? "student" : "location", label, rows, { from: fromDate, to: toDate });
                  }}
                  title="Download PDF report"
                >Reports</button>
                <span className={"chevron" + (open ? " open" : "")}>▾</span>
              </div>
              {open && (
                <div className="card-body p-0">
                  {groupKey === "location" ? (
                    <React.Fragment>
                      <StudentSubtotalTable rows={rows} />
                      <div className="text-center border-top">
                        <button
                          className="btn btn-sm btn-link text-decoration-none"
                          onClick={() => toggleGroup(key + ":detail")}
                        >
                          {openGroups[key + ":detail"] ? "Hide individual records ▲" : "Show individual records ▼"}
                        </button>
                      </div>
                      {openGroups[key + ":detail"] && <RecordTable rows={rows} />}
                    </React.Fragment>
                  ) : (
                    <RecordTable rows={rows} />
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  const selectedLocation = form.name ? roster[form.name] : "";

  return (
    <React.Fragment>
      {/* Top navbar */}
      <nav className="topbar py-2 mb-3 sticky-top">
        <div className="container d-flex align-items-center justify-content-between" style={{ maxWidth: 960 }}>
          <div className="d-flex align-items-center gap-2">
            <div className="logo-mark">Q</div>
            <span className="text-white font-display fw-bold fs-5">Quran Tehfeez</span>
          </div>
          <button className="btn btn-sm text-white-50 border-0" onClick={loadRecords} title="Refresh">
            ↻ Refresh
          </button>
        </div>
      </nav>

      <div className="container pb-5" style={{ maxWidth: 960 }}>

        {/* Stat tiles */}
        <div className="row g-2 g-md-3 mb-3">
          <div className="col-4">
            <div className="tile tile-green">
              <div className="num">{stats.present}</div>
              <div className="lbl">Present</div>
            </div>
          </div>
          <div className="col-4">
            <div className="tile tile-blue">
              <div className="num">{stats.holiday}</div>
              <div className="lbl">Holiday</div>
            </div>
          </div>
          <div className="col-4">
            <div className="tile tile-orange">
              <div className="num">{stats.absent}</div>
              <div className="lbl">Absent</div>
            </div>
          </div>
        </div>

        {/* Contribution card */}
        <div className="contribution p-3 mb-3">
          <div className="d-flex align-items-center gap-2 mb-3">
            <span style={{ fontSize: "1.3rem" }}>🏆</span>
            <span className="font-display fw-bold fs-5">Contribution</span>
            {(fromDate || toDate) && (
              <span className="ms-auto small" style={{ opacity: 0.85 }}>
                {fromDate ? displayDate(fromDate) : "…"} → {toDate ? displayDate(toDate) : "…"}
              </span>
            )}
          </div>
          <div className="row g-2">
            <div className="col-4"><div className="inner">
              <div className="num">{stats.present}</div>
              <div className="lbl">Classes</div>
            </div></div>
            <div className="col-4"><div className="inner">
              <div className="num">{stats.minutes.toLocaleString()}</div>
              <div className="lbl">Minutes</div>
            </div></div>
            <div className="col-4"><div className="inner">
              <div className="num">{stats.students}</div>
              <div className="lbl">Students</div>
            </div></div>
          </div>
        </div>

        {/* Attendance / check-in card */}
        <div className="card mb-3">
          <div className="card-body">
            <div className="d-flex align-items-center gap-2 mb-3">
              <span style={{ fontSize: "1.2rem" }}>🧑‍🏫</span>
              <span className="section-title">Attendance</span>
              <button
                className="btn btn-sm btn-ghost ms-auto"
                onClick={() => { setShowAddStudent((v) => !v); setAddStudentError(""); }}
              >{showAddStudent ? "Close" : "+ Add Student"}</button>
            </div>

            {showAddStudent && (
              <div className="add-student-panel mb-3">
                <div className="row g-2 align-items-end">
                  <div className="col-12 col-md-5">
                    <label className="form-label small fw-semibold text-secondary mb-1">New student name</label>
                    <input
                      type="text"
                      className="form-control form-control-sm"
                      placeholder="e.g. Fatema Rasheed"
                      value={newName}
                      onChange={(e) => setNewName(e.target.value)}
                    />
                  </div>
                  <div className="col-8 col-md-4">
                    <label className="form-label small fw-semibold text-secondary mb-1">Location</label>
                    <input
                      type="text"
                      className="form-control form-control-sm"
                      placeholder="e.g. Jeddah"
                      list="known-locations"
                      value={newLocation}
                      onChange={(e) => setNewLocation(e.target.value)}
                    />
                    <datalist id="known-locations">
                      {knownLocations.map((l) => <option key={l} value={l} />)}
                    </datalist>
                  </div>
                  <div className="col-4 col-md-3">
                    <button
                      className="btn btn-sm btn-navy w-100"
                      disabled={addingStudent}
                      onClick={addStudent}
                    >{addingStudent ? "Adding…" : "Add"}</button>
                  </div>
                </div>
                {addStudentError && (
                  <div className="alert alert-danger py-2 small mt-2 mb-0">{addStudentError}</div>
                )}

                {studentNames.length > 0 && (
                  <div className="roster-list mt-3">
                    <div className="small fw-semibold text-secondary mb-1">
                      Current roster ({studentNames.length})
                    </div>
                    <div className="roster-scroll">
                      {studentNames.map((n) => (
                        <div className="roster-row" key={n}>
                          <span className="sug-avatar">{initials(n)}</span>
                          <span className="flex-grow-1 text-truncate">{n}</span>
                          <span className="small text-secondary me-2">{roster[n]}</span>
                          <button
                            className="btn btn-sm btn-link text-secondary p-0"
                            title="Remove from roster"
                            onClick={() => removeStudent(n)}
                          >✕</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
            <div className="row g-3">
              <div className="col-12 col-md-6 col-lg-4 position-relative">
                <label className="form-label small fw-semibold text-secondary mb-1">Student</label>
                <input
                  type="text"
                  className={"form-control" + (studentQuery && !form.name ? " is-invalid" : "")}
                  placeholder="Type to search students…"
                  value={studentQuery}
                  autoComplete="off"
                  onChange={(e) => onStudentInput(e.target.value)}
                  onFocus={() => setShowSuggestions(true)}
                  onBlur={() => setTimeout(() => setShowSuggestions(false), 150)}
                />
                {showSuggestions && studentQuery.trim() !== "" && (
                  <div className="suggestions shadow">
                    {suggestions.length === 0 ? (
                      <div className="suggestion-item text-secondary fst-italic">
                        No matching student
                      </div>
                    ) : (
                      suggestions.map((n) => (
                        <div
                          key={n}
                          className={"suggestion-item" + (n === form.name ? " active" : "")}
                          onMouseDown={(e) => { e.preventDefault(); pickStudent(n); }}
                        >
                          <span className="sug-avatar">{initials(n)}</span>
                          <span className="flex-grow-1">{n}</span>
                          <span className="small text-secondary">{roster[n]}</span>
                        </div>
                      ))
                    )}
                  </div>
                )}
              </div>
              <div className="col-6 col-md-6 col-lg-2">
                <label className="form-label small fw-semibold text-secondary mb-1">Location</label>
                <input className="form-control bg-light text-secondary" value={selectedLocation}
                       placeholder="Auto" readOnly tabIndex={-1} />
              </div>
              <div className="col-6 col-md-4 col-lg-2">
                <label className="form-label small fw-semibold text-secondary mb-1">Class date</label>
                <input
                  type="date"
                  className="form-control"
                  value={form.date}
                  onChange={(e) => setForm({ ...form, date: e.target.value })}
                />
              </div>
              <div className="col-6 col-md-4 col-lg-2">
                <label className="form-label small fw-semibold text-secondary mb-1">Attendance</label>
                <select
                  className="form-select"
                  value={form.status}
                  onChange={(e) => setForm({ ...form, status: e.target.value })}
                >
                  <option value="present">Present</option>
                  <option value="absent">Absent</option>
                  <option value="holiday">Holiday</option>
                </select>
              </div>
              <div className="col-6 col-md-4 col-lg-2">
                <label className="form-label small fw-semibold text-secondary mb-1">Minutes</label>
                <input
                  type="number"
                  min="1"
                  className={"form-control" + (form.status !== "present" ? " bg-light" : "")}
                  placeholder="e.g. 30"
                  disabled={form.status !== "present"}
                  value={form.status === "present" ? form.duration : ""}
                  onChange={(e) => setForm({ ...form, duration: e.target.value })}
                />
              </div>
              <div className="col-12">
                <button
                  className="btn btn-checkin w-100"
                  disabled={saving}
                  onClick={addRecord}
                >
                  {saving ? "Saving…" : "→] Check In"}
                </button>
              </div>
            </div>
            {error && <div className="alert alert-danger py-2 small mt-3 mb-0">{error}</div>}
          </div>
        </div>

        {/* Date range filter */}
        <div className="card mb-3">
          <div className="card-body py-2">
            <div className="row g-2 align-items-end">
              <div className="col-6 col-md-3">
                <label className="form-label small fw-semibold text-secondary mb-1">From date</label>
                <input
                  type="date"
                  className="form-control form-control-sm"
                  value={fromDate}
                  max={toDate || undefined}
                  onChange={(e) => setFromDate(e.target.value)}
                />
              </div>
              <div className="col-6 col-md-3">
                <label className="form-label small fw-semibold text-secondary mb-1">To date</label>
                <input
                  type="date"
                  className="form-control form-control-sm"
                  value={toDate}
                  min={fromDate || undefined}
                  onChange={(e) => setToDate(e.target.value)}
                />
              </div>
              <div className="col-12 col-md-6 d-flex align-items-center gap-2 flex-wrap">
                {(fromDate || toDate) ? (
                  <React.Fragment>
                    <button
                      className="btn btn-sm btn-ghost"
                      onClick={() => { setFromDate(""); setToDate(""); }}
                    >Clear</button>
                    <span className="small text-secondary">
                      Showing <b style={{ color: "#2a313c" }}>{filtered.length}</b> of {records.length} records
                    </span>
                  </React.Fragment>
                ) : (
                  <span className="small text-secondary">Showing all {records.length} records</span>
                )}
              </div>
            </div>
          </div>
        </div>

        {/* View tabs */}
        <ul className="nav nav-pills flex-nowrap overflow-auto mb-3 gap-1">
          {[
            { id: "all", label: "All records" },
            { id: "name", label: "By student" },
            { id: "location", label: "By location" },
          ].map((t) => (
            <li className="nav-item" key={t.id}>
              <button
                className={"nav-link text-nowrap" + (view === t.id ? " active" : "")}
                onClick={() => setView(t.id)}
              >{t.label}</button>
            </li>
          ))}
        </ul>

        {/* Content */}
        {loading ? (
          <div className="text-center text-secondary py-5">
            <div className="spinner-border spinner-border-sm me-2" role="status"></div>
            Loading records from Google Sheets…
          </div>
        ) : view === "all" ? (
          filtered.length === 0 ? (
            <RangeEmpty />
          ) : (
            <div className="card">
              <div className="card-body p-0">
                <RecordTable rows={filtered} />
              </div>
            </div>
          )
        ) : (
          <GroupedView groupKey={view} />
        )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AttendanceDashboard />);
</script>
</body>
</html>
